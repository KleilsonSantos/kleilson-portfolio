# API — Cloudflare Workers (plano Free) · ADR-0008 / #8
# Deploy: npm run deploy:api  (sem Docker / sem Containers pagos)
#
# Caminho pago futuro (Containers + Fastify): ver docs/guides/deploy.md

name = "kleilson-portfolio-api"
main = "workers/api/src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

# Remove Durable Object do deploy Containers anterior (se existir na conta)
[[migrations]]
tag = "v2"
deleted_classes = ["ApiContainer"]

# Secrets (nunca no Git):
#   npx wrangler secret put SUPABASE_URL
#   npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   npx wrangler secret put CORS_ORIGIN
#   npx wrangler secret put SENTRY_DSN   # opcional (#9)
# CORS_ORIGIN ex.: https://kleilson-portfolio.pages.dev
