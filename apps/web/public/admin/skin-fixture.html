<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Admin skin fixture | Kleilson Santos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
    />
    <!--
      Fixture estática para QA local (Passo 5b) SEM OAuth.
      Simula Emotion Decap: shells brancos + modal + list item (regressões de layout).
    -->
    <link rel="stylesheet" href="/design-tokens.css?v=7" />
    <link rel="stylesheet" href="/admin/admin.css?v=7" />
    <style>
      .css-mock-widget {
        display: block;
        width: 100%;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 16px 20px;
        border: 2px solid #dfdfe3;
        border-radius: 5px;
        border-top-left-radius: 0;
        background-color: #fff !important;
        color: #444a57 !important;
      }
      .css-mock-EditorContainer {
        min-height: 100vh;
        padding: 2rem;
        background-color: #fff !important;
      }
      .css-mock-ListCard {
        display: block;
        max-width: 48rem;
        margin: 2rem auto;
        padding: 16px 20px;
        border: 2px solid #dfdfe3;
        border-radius: 5px;
        background: #fff !important;
      }
      .css-mock-ListCardLink {
        display: block;
        padding: 8px 12px;
        border: 1px solid #dfdfe3;
        border-radius: 5px;
        background: #f1f1f1 !important;
        color: #333 !important;
        text-decoration: none;
        font-weight: 600;
      }
      .css-mock-ListItem {
        max-width: 48rem;
        margin: 1rem auto;
        padding: 24px;
        min-height: 8rem;
        border: 2px solid #dfdfe3;
        background: #fff !important;
      }
      .css-mock-TopBar {
        display: flex;
        justify-content: space-between;
        padding: 12px;
        margin-bottom: 16px;
        border: 2px solid #ccc;
        background: #eee !important;
      }
      .css-mock-StyledModal {
        max-width: 48rem;
        margin: 2rem auto;
        padding: 8px;
        border: 2px solid #dfdfe3;
        background: #fff !important;
      }
      .css-mock-LibraryTop {
        padding: 24px;
        margin-bottom: 24px;
        border: 1px solid #ccc;
        background: #f5f5f5 !important;
      }
      .css-mock-EmptyMessage {
        padding: 48px;
        min-height: 12rem;
        border: 2px solid #ccc;
        background: #fafafa !important;
      }
    </style>
  </head>
  <body>
    <header class="admin-brandbar" role="banner">
      <a class="admin-brandbar__logo" href="/">Kleilson Santos</a>
      <span class="admin-brandbar__meta">Skin fixture</span>
      <a class="admin-brandbar__link" href="/admin/">← Admin</a>
    </header>

    <div id="nc-root">
      <div class="css-mock-EditorContainer EditorContainer">
        <div class="css-mock-ListCard ListCard" data-testid="list-card">
          <a class="css-mock-ListCardLink ListCardLink" href="#" data-testid="list-card-link">
            <span class="css-mock-ListCardTitle ListCardTitle" data-testid="list-card-title"
              >Profile</span
            >
          </a>
        </div>

        <div class="css-mock-ListItem ListItem" data-testid="list-item">
          <div class="css-mock-TopBar StyledListItemTopBar TopBar" data-testid="list-item-topbar">
            <span>›</span><span>=</span><span>×</span>
          </div>
          <div class="css-mock-ControlContainer ControlContainer">
            <label class="css-mock-FieldLabel FieldLabel">ID</label>
            <input type="text" value="banking" readonly data-testid="list-item-input" />
          </div>
        </div>

        <div class="css-mock-StyledModal StyledModal" data-testid="media-modal">
          <div class="css-mock-LibraryTop LibraryTop" data-testid="media-library-top">
            <h2 class="LibraryTitle">Recursos de mídia</h2>
            <button type="button">Upload</button>
          </div>
          <div
            class="css-mock-EmptyMessage EmptyMessageContainer"
            data-testid="media-empty"
          >
            Nenhum recurso encontrado
          </div>
        </div>

        <div class="css-mock-ControlPaneContainer ControlPaneContainer">
          <div class="css-mock-ControlContainer ControlContainer">
            <div class="css-mock-widget" data-testid="object-shell">
              <div class="css-mock-TopBarContainer TopBarContainer" data-testid="object-topbar">
                ↓
              </div>
              <div class="css-mock-NestedObjectLabel NestedObjectLabel" data-testid="object-label">
                PROFILE
              </div>
              <div class="css-mock-ControlContainer ControlContainer">
                <label class="css-mock-FieldLabel FieldLabel">NOME</label>
                <input type="text" value="Kleilson dos Santos" readonly />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
