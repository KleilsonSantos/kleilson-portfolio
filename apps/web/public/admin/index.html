<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#2dd4bf" />
    <meta name="color-scheme" content="dark light" />
    <title>Editorial | Kleilson Santos</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
    />
  </head>
  <body>
    <!--
      Decap CMS — GitHub OAuth via Worker Free (ADR-0012).
      Visual: ADR-0004 tokens (token-only chrome; sem reinventar layout Decap).
      Mount: #nc-root (docs/custom-mounting). Preview: registerPreviewStyle only.
      Cache-bust ?v=8 — split chrome/preview; community dark pattern + tokens.
      Refs: decapcms.org/docs/customization · Nats-ji dark-mode · Decap #7084
    -->
    <header class="admin-brandbar" role="banner">
      <a class="admin-brandbar__logo" href="/">Kleilson Santos</a>
      <span class="admin-brandbar__meta">Editorial</span>
      <a class="admin-brandbar__link" href="/">← Site</a>
    </header>

    <div id="nc-root"></div>

    <script src="https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js"></script>
    <!-- Chrome APÓS o CMS (vence Emotion). Preview NÃO vai no <link>. -->
    <link rel="stylesheet" href="/design-tokens.css?v=8" />
    <link rel="stylesheet" href="/admin/admin-chrome.css?v=8" />
    <script>
      ;(function () {
        var SKIN = ['/design-tokens.css?v=8', '/admin/admin-chrome.css?v=8']

        function skinsAlreadyOnTop() {
          var a = document.querySelector('link[href="' + SKIN[0] + '"]')
          var b = document.querySelector('link[href="' + SKIN[1] + '"]')
          if (!a || !b) return false
          return b === document.head.lastElementChild && a.nextElementSibling === b
        }

        function bringSkinToTop() {
          if (skinsAlreadyOnTop()) return
          SKIN.forEach(function (href) {
            var existing = document.querySelector('link[href="' + href + '"]')
            if (existing) {
              document.head.appendChild(existing)
              return
            }
            var link = document.createElement('link')
            link.rel = 'stylesheet'
            link.href = href
            document.head.appendChild(link)
          })
        }

        bringSkinToTop()
        ;[400, 1200, 3000, 8000].forEach(function (ms) {
          setTimeout(bringSkinToTop, ms)
        })

        /*
          NÃO observe documentElement + appendChild em loop (freeze).
          Reempilha só quando Emotion injeta <style> no <head>.
        */
        if (typeof MutationObserver !== 'undefined') {
          var scheduled = null
          var obs = new MutationObserver(function (mutations) {
            var emotionStyle = false
            for (var i = 0; i < mutations.length; i++) {
              var nodes = mutations[i].addedNodes
              for (var j = 0; j < nodes.length; j++) {
                var n = nodes[j]
                if (n && n.nodeName === 'STYLE') {
                  emotionStyle = true
                  break
                }
              }
              if (emotionStyle) break
            }
            if (!emotionStyle || skinsAlreadyOnTop()) return
            if (scheduled) return
            scheduled = setTimeout(function () {
              scheduled = null
              bringSkinToTop()
            }, 50)
          })
          obs.observe(document.head, { childList: true })
        }

        if (window.CMS) {
          /* Oficial: só preview pane — não o chrome admin */
          CMS.registerPreviewStyle('/design-tokens.css?v=8')
          CMS.registerPreviewStyle('/admin/admin-preview.css?v=8')
        }
      })()
    </script>
  </body>
</html>
