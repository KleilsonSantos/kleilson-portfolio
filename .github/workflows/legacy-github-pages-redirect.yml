# Publica redirect estático no GitHub Pages (legado → Cloudflare).
# Produção canônica: Cloudflare Pages (deploy-pages.yml).

name: Legacy GitHub Pages redirect

on:
  push:
    branches: [main]
    paths:
      - 'legacy-github-pages/**'
      - '.github/workflows/legacy-github-pages-redirect.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: legacy-github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: legacy-github-pages
      - id: deployment
        uses: actions/deploy-pages@v4
