name: Deploy Cloudflare Pages

# Automatiza: push/merge em main → build → Pages (produção).
# Secrets: CLOUDFLARE_API_TOKEN (Pages Edit + Account Read), CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kleilson/web build
        env:
          VITE_API_BASE_URL: https://kleilson-portfolio-api.kleilsonsantos.workers.dev

      # Wrangler na raiz (package.json) — wrangler-action + pnpm workspace falha com
      # ERR_PNPM_ADDING_TO_ROOT se tentar `pnpm add wrangler` sem -w (CF #181/#338).
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy apps/web/dist --project-name=kleilson-portfolio --branch=main
