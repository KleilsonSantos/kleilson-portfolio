version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - chore
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - chore
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - chore
  - package-ecosystem: npm
    directory: /apps/worker-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - chore
  - package-ecosystem: npm
    directory: /apps/decap-oauth
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - chore
  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - chore
