# pnpm workspaces: um único lockfile na raiz.
# Mirar subpastas gera PRs sem pnpm-lock.yaml coerente → CI frozen-lockfile falha.
# Ref: https://github.com/dependabot/dependabot-core/issues/10758
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - chore
    groups:
      cloudflare-types:
        patterns:
          - "@cloudflare/workers-types"
